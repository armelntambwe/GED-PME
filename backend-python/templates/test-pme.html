<!DOCTYPE html>
<html>
<head>
    <title>Test Admin PME</title>
</head>
<body>
    <h1>Test</h1>
    <div id="stats"></div>
    <script>
        const token = localStorage.getItem('token');
        if (!token) {
            document.body.innerHTML = '<h2>Pas de token. <a href="/login">Se connecter</a></h2>';
        } else {
            document.body.innerHTML += '<p>Token trouvé. Appel API...</p>';
            fetch('/api/pme/stats', {
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(r => r.json())
            .then(data => {
                document.getElementById('stats').innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
            })
            .catch(err => {
                document.getElementById('stats').innerHTML = '<p style="color:red">Erreur : ' + err.message + '</p>';
            });
        }
    </script>
</body>
</html>
