<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>GED-PME - Hors-ligne</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
        }
        .offline-container {
            background: rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 20px;
        }
        i { font-size: 80px; margin-bottom: 20px; }
        h1 { margin-bottom: 10px; }
        p { margin-bottom: 20px; opacity: 0.8; }
        .btn {
            background: white;
            color: #667eea;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <i class="fas fa-wifi-slash"></i>
        <h1>Vous êtes hors-ligne</h1>
        <p>Vérifiez votre connexion internet</p>
        <button class="btn" onclick="location.reload()">Réessayer</button>
    </div>
</body>
</html>
