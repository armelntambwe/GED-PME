<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GED-PME - Connexion</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/static/css/ged-theme.css">
    <link rel="stylesheet" href="/static/css/ged-theme.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--ged-font, 'Plus Jakarta Sans', sans-serif);
            background: var(--ged-gradient-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 2rem 0;
        }
        body::before {
            content: '';
            position: fixed; inset: 0;
            background: radial-gradient(ellipse at 30% 20%, rgba(8,145,178,0.3) 0%, transparent 50%);
            pointer-events: none;
        }

        .card-login {
            border: none;
            border-radius: 2rem;
            box-shadow: var(--ged-shadow-lg, 0 25px 50px rgba(0,0,0,0.3));
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.97);
            position: relative;
            z-index: 1;
        }

        .brand-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #0ea5e9, #3b82f6);
            border-radius: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem auto;
            box-shadow: 0 10px 15px -3px rgba(14, 165, 233, 0.3);
        }

        .brand-icon i {
            font-size: 2.2rem;
            color: white;
        }

        .form-control {
            border-radius: 1rem;
            padding: 0.75rem 1rem;
            border: 1px solid #e2e8f0;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .form-control:focus {
            border-color: #0ea5e9;
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.2);
            outline: none;
        }

        .btn-login {
            background: var(--ged-gradient, linear-gradient(135deg, #0891b2, #6366f1));
            border: none;
            padding: 0.75rem;
            border-radius: 1rem;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s;
            box-shadow: 0 4px 6px -1px rgba(14, 165, 233, 0.3);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(14, 165, 233, 0.4);
            background: linear-gradient(135deg, #0284c7, #2563eb);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .link-register {
            color: #0ea5e9;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .link-register:hover {
            color: #0284c7;
            text-decoration: underline;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: #94a3b8;
            font-size: 0.85rem;
            margin: 1.5rem 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e2e8f0;
        }

        .divider::before {
            margin-right: 1rem;
        }

        .divider::after {
            margin-left: 1rem;
        }

        .alert {
            border-radius: 1rem;
            font-size: 0.85rem;
        }
    </style>
</head>
<body class="ged-app">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card card-login p-4 p-md-5">
                    <div class="text-center">
                        <div class="brand-icon">
                            <i class="bi bi-folder2-open"></i>
                        </div>
                        <h2 class="fw-bold mt-3" style="color: #0f172a;">Bienvenue</h2>
                        <p class="text-secondary mb-4">Connectez-vous à votre espace GED-PME</p>
                    </div>

                    <form id="loginForm" autocomplete="on">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Adresse email</label>
                            <input type="email" id="email" name="username" class="form-control" placeholder="exemple@entreprise.com" autocomplete="username" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Mot de passe</label>
                            <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" autocomplete="current-password" required>
                        </div>
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="remember">
                                <label class="form-check-label small" for="remember">Se souvenir de moi</label>
                            </div>
                            <a href="#" class="link-register small">Mot de passe oublié ?</a>
                        </div>
                        <button type="submit" class="btn btn-login w-100" id="loginBtn">Se connecter</button>
                    </form>

                    <div id="twofaStep" class="d-none mt-3">
                        <div class="alert alert-info small py-2"><i class="bi bi-shield-lock me-1"></i>Double authentification — saisissez le code à 6 chiffres.</div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Code d'authentification</label>
                            <input type="text" id="twofaCode" class="form-control text-center fs-5" inputmode="numeric" maxlength="6" placeholder="000000" autocomplete="one-time-code">
                        </div>
                        <button type="button" class="btn btn-login w-100" id="twofaVerifyBtn">Valider le code</button>
                        <button type="button" class="btn btn-link btn-sm w-100 mt-2 text-secondary" id="twofaBackBtn">← Retour</button>
                    </div>

                    <div class="divider">Nouveau sur GED-PME ?</div>

                    <div class="text-center">
                        <a href="/register-company" class="btn btn-outline-secondary w-100 rounded-pill py-2">Créer une entreprise</a>
                    </div>

                    <div id="errorMessage" class="alert alert-danger mt-3 d-none"></div>
                </div>

                <p class="text-center text-secondary mt-4 small">
                    <i class="bi bi-shield-check me-1"></i> Sécurisé par JWT, 2FA et chiffrement
                </p>
            </div>
        </div>
    </div>

    <script>
        let pending2FAToken = null;

        function finishLogin(data) {
            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify(data.user));
            if (data.user.role === 'admin_global') {
                window.location.href = '/dashboard-admin-global';
            } else if (data.user.role === 'admin_pme') {
                window.location.href = '/dashboard-pme';
            } else {
                window.location.href = '/dashboard-employee';
            }
        }

        function show2FAStep(tempToken) {
            pending2FAToken = tempToken;
            document.getElementById('loginForm').classList.add('d-none');
            document.getElementById('twofaStep').classList.remove('d-none');
            document.getElementById('twofaCode').value = '';
            document.getElementById('twofaCode').focus();
        }

        function hide2FAStep() {
            pending2FAToken = null;
            document.getElementById('twofaStep').classList.add('d-none');
            document.getElementById('loginForm').classList.remove('d-none');
        }

        document.getElementById('twofaBackBtn').addEventListener('click', hide2FAStep);

        document.getElementById('twofaVerifyBtn').addEventListener('click', async () => {
            const code = document.getElementById('twofaCode').value.trim();
            const errorDiv = document.getElementById('errorMessage');
            const btn = document.getElementById('twofaVerifyBtn');
            errorDiv.classList.add('d-none');
            if (!pending2FAToken || !code) {
                errorDiv.classList.remove('d-none');
                errorDiv.textContent = 'Saisissez le code à 6 chiffres.';
                return;
            }
            btn.disabled = true;
            btn.textContent = 'Vérification…';
            try {
                const response = await fetch('/login/verify-2fa', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ temp_token: pending2FAToken, code }),
                });
                const data = await response.json();
                if (data.success && data.token) {
                    finishLogin(data);
                } else {
                    errorDiv.classList.remove('d-none');
                    errorDiv.textContent = data.message || 'Code incorrect.';
                }
            } catch (err) {
                errorDiv.classList.remove('d-none');
                errorDiv.textContent = 'Erreur de connexion au serveur.';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Valider le code';
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            const loginBtn = document.getElementById('loginBtn');
            
            errorDiv.classList.add('d-none');
            
            if (!email || !password) {
                errorDiv.classList.remove('d-none');
                errorDiv.textContent = 'Veuillez saisir votre email et votre mot de passe.';
                return;
            }

            loginBtn.disabled = true;
            loginBtn.innerHTML = 'Connexion en cours...';

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();

                if (data.success && data.requires_2fa) {
                    show2FAStep(data.temp_token);
                } else if (data.success && data.token) {
                    finishLogin(data);
                } else {
                    errorDiv.classList.remove('d-none');
                    errorDiv.textContent = data.message || 'Échec de la connexion. Vérifiez vos identifiants.';
                }
            } catch (err) {
                console.error('Erreur:', err);
                errorDiv.classList.remove('d-none');
                errorDiv.textContent = 'Erreur de connexion au serveur. Veuillez réessayer.';
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'Se connecter';
            }
        });
    </script>
</body>
</html>
