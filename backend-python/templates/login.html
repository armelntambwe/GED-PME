<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GED-PME - Connexion</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 2rem 0;
        }

        .card-login {
            border: none;
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.98);
            transition: transform 0.2s ease;
        }

        .card-login:hover {
            transform: translateY(-4px);
        }

        .brand-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #0ea5e9, #3b82f6);
            border-radius: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem auto;
            box-shadow: 0 10px 15px -3px rgba(14, 165, 233, 0.3);
        }

        .brand-icon i {
            font-size: 2.2rem;
            color: white;
        }

        .form-control {
            border-radius: 1rem;
            padding: 0.75rem 1rem;
            border: 1px solid #e2e8f0;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .form-control:focus {
            border-color: #0ea5e9;
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.2);
            outline: none;
        }

        .btn-login {
            background: linear-gradient(135deg, #0ea5e9, #3b82f6);
            border: none;
            padding: 0.75rem;
            border-radius: 1rem;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s;
            box-shadow: 0 4px 6px -1px rgba(14, 165, 233, 0.3);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(14, 165, 233, 0.4);
            background: linear-gradient(135deg, #0284c7, #2563eb);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .link-register {
            color: #0ea5e9;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .link-register:hover {
            color: #0284c7;
            text-decoration: underline;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: #94a3b8;
            font-size: 0.85rem;
            margin: 1.5rem 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e2e8f0;
        }

        .divider::before {
            margin-right: 1rem;
        }

        .divider::after {
            margin-left: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card card-login p-4 p-md-5">
                    <div class="text-center">
                        <div class="brand-icon">
                            <i class="bi bi-folder2-open"></i>
                        </div>
                        <h2 class="fw-bold mt-3" style="color: #0f172a;">Bienvenue</h2>
                        <p class="text-secondary mb-4">Connectez-vous à votre espace GED-PME</p>
                    </div>

                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Adresse email</label>
                            <input type="email" id="email" class="form-control" placeholder="exemple@entreprise.com" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Mot de passe</label>
                            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                        </div>
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="remember">
                                <label class="form-check-label small" for="remember">Se souvenir de moi</label>
                            </div>
                            <a href="#" class="link-register small">Mot de passe oublié ?</a>
                        </div>
                        <button type="submit" class="btn btn-login w-100">Se connecter</button>
                    </form>

                    <div class="divider">Nouveau sur GED-PME ?</div>

                    <div class="text-center">
                        <a href="/register-company" class="btn btn-outline-secondary w-100 rounded-pill py-2">Créer une entreprise</a>
                    </div>

                    <div id="errorMessage" class="alert alert-danger mt-3 d-none"></div>
                </div>

                <p class="text-center text-secondary mt-4 small">
                    <i class="bi bi-shield-check me-1"></i> Sécurisé par JWT & chiffrement
                </p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.classList.add('d-none');

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    if (data.user.role === 'admin_global') window.location.href = '/dashboard-admin-global';
                    else if (data.user.role === 'admin_pme') window.location.href = '/dashboard-pme';
                    else window.location.href = '/dashboard-employee';
                } else {
                    errorDiv.classList.remove('d-none');
                    errorDiv.textContent = data.message || 'Échec de la connexion. Vérifiez vos identifiants.';
                }
            } catch (err) {
                errorDiv.classList.remove('d-none');
                errorDiv.textContent = 'Erreur de connexion au serveur. Veuillez réessayer.';
            }
        });
    </script>
</body>
</html>
