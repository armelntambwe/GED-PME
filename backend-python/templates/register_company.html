<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GED-PME - Inscription entreprise</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            min-height: 100vh;
            padding: 2rem 0;
        }

        .card-register {
            border: none;
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            background: rgba(255, 255, 255, 0.98);
            transition: transform 0.2s ease;
        }

        .card-register:hover {
            transform: translateY(-4px);
        }

        .brand-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #0ea5e9, #3b82f6);
            border-radius: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem auto;
            box-shadow: 0 10px 15px -3px rgba(14, 165, 233, 0.3);
        }

        .brand-icon i {
            font-size: 2.2rem;
            color: white;
        }

        .form-control, .form-select {
            border-radius: 1rem;
            padding: 0.75rem 1rem;
            border: 1px solid #e2e8f0;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .form-control:focus, .form-select:focus {
            border-color: #0ea5e9;
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.2);
            outline: none;
        }

        .btn-register {
            background: linear-gradient(135deg, #0ea5e9, #3b82f6);
            border: none;
            padding: 0.85rem;
            border-radius: 1rem;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s;
            box-shadow: 0 4px 6px -1px rgba(14, 165, 233, 0.3);
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(14, 165, 233, 0.4);
            background: linear-gradient(135deg, #0284c7, #2563eb);
        }

        .link-login {
            color: #0ea5e9;
            text-decoration: none;
            font-weight: 500;
        }

        .link-login:hover {
            color: #0284c7;
            text-decoration: underline;
        }

        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .step {
            text-align: center;
            font-size: 0.8rem;
            color: #94a3b8;
        }

        .step.active {
            color: #0ea5e9;
            font-weight: 600;
        }

        .step .step-circle {
            width: 32px;
            height: 32px;
            background: #e2e8f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 0.3rem auto;
            font-weight: bold;
        }

        .step.active .step-circle {
            background: #0ea5e9;
            color: white;
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-7">
                <div class="card card-register p-4 p-md-5">
                    <div class="text-center">
                        <div class="brand-icon">
                            <i class="bi bi-building"></i>
                        </div>
                        <h2 class="fw-bold mt-3" style="color: #0f172a;">Créer mon entreprise</h2>
                        <p class="text-secondary mb-4">Rejoignez GED-PME et digitalisez votre gestion documentaire</p>
                    </div>

                    <!-- Indicateur d'étapes simplifié -->
                    <div class="step-indicator">
                        <div class="step active"><div class="step-circle">1</div> Entreprise</div>
                        <div class="step"><div class="step-circle">2</div> Administrateur</div>
                    </div>

                    <form id="registerCompanyForm">
                        <!-- Étape 1 : Informations entreprise -->
                        <div id="step1">
                            <h5 class="fw-semibold mb-3">Informations de l'entreprise</h5>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Nom de l'entreprise <span class="text-danger">*</span></label>
                                <input type="text" id="compNom" class="form-control" placeholder="Ex: Entreprise XYZ" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Email de l'entreprise</label>
                                <input type="email" id="compEmail" class="form-control" placeholder="contact@entreprise.com">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Téléphone</label>
                                <input type="tel" id="compTel" class="form-control" placeholder="+243 XXX XXX XXX">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Adresse</label>
                                <textarea id="compAdresse" class="form-control" rows="2" placeholder="Lubumbashi, RDC"></textarea>
                            </div>
                        </div>

                        <!-- Étape 2 : Compte administrateur (cachée au départ) -->
                        <div id="step2" style="display: none;">
                            <h5 class="fw-semibold mb-3">Compte administrateur</h5>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Nom complet <span class="text-danger">*</span></label>
                                <input type="text" id="adminNom" class="form-control" placeholder="Jean Dupont" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Email <span class="text-danger">*</span></label>
                                <input type="email" id="adminEmail" class="form-control" placeholder="admin@entreprise.com" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Téléphone</label>
                                <input type="tel" id="adminTel" class="form-control" placeholder="+243 XXX XXX XXX">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Mot de passe <span class="text-danger">*</span></label>
                                <input type="password" id="adminPassword" class="form-control" placeholder="••••••••" required>
                                <small class="text-muted">Au moins 6 caractères</small>
                            </div>
                        </div>

                        <!-- Navigation entre étapes -->
                        <div class="d-flex justify-content-between mt-4">
                            <button type="button" id="prevBtn" class="btn btn-outline-secondary px-4" style="display: none;">Précédent</button>
                            <button type="button" id="nextBtn" class="btn btn-register px-4 ms-auto">Suivant</button>
                            <button type="submit" id="submitBtn" class="btn btn-register px-4" style="display: none;">Créer mon entreprise</button>
                        </div>
                    </form>

                    <div id="errorMessage" class="alert alert-danger mt-3 d-none"></div>
                    <div id="successMessage" class="alert alert-success mt-3 d-none"></div>

                    <div class="text-center mt-4">
                        <p class="text-secondary">Vous avez déjà un compte ? <a href="/login" class="link-login">Se connecter</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentStep = 1;
        const step1 = document.getElementById('step1');
        const step2 = document.getElementById('step2');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const submitBtn = document.getElementById('submitBtn');
        const steps = document.querySelectorAll('.step');

        function updateStepUI() {
            if (currentStep === 1) {
                step1.style.display = 'block';
                step2.style.display = 'none';
                prevBtn.style.display = 'none';
                nextBtn.style.display = 'block';
                submitBtn.style.display = 'none';
                steps[0].classList.add('active');
                steps[1].classList.remove('active');
            } else {
                step1.style.display = 'none';
                step2.style.display = 'block';
                prevBtn.style.display = 'block';
                nextBtn.style.display = 'none';
                submitBtn.style.display = 'block';
                steps[0].classList.remove('active');
                steps[1].classList.add('active');
            }
        }

        nextBtn.addEventListener('click', () => {
            // Validation étape 1
            const nom = document.getElementById('compNom').value.trim();
            if (!nom) {
                alert('Veuillez saisir le nom de l\'entreprise');
                return;
            }
            currentStep = 2;
            updateStepUI();
        });

        prevBtn.addEventListener('click', () => {
            currentStep = 1;
            updateStepUI();
        });

        document.getElementById('registerCompanyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            errorDiv.classList.add('d-none');
            successDiv.classList.add('d-none');

            // Collecte des données
            const entrepriseData = {
                nom: document.getElementById('compNom').value.trim(),
                email: document.getElementById('compEmail').value.trim(),
                telephone: document.getElementById('compTel').value.trim(),
                adresse: document.getElementById('compAdresse').value.trim()
            };

            const adminData = {
                nom: document.getElementById('adminNom').value.trim(),
                email: document.getElementById('adminEmail').value.trim(),
                telephone: document.getElementById('adminTel').value.trim(),
                password: document.getElementById('adminPassword').value
            };

            if (!adminData.nom || !adminData.email || !adminData.password) {
                errorDiv.classList.remove('d-none');
                errorDiv.textContent = 'Veuillez remplir tous les champs obligatoires du compte administrateur';
                return;
            }

            if (adminData.password.length < 6) {
                errorDiv.classList.remove('d-none');
                errorDiv.textContent = 'Le mot de passe doit contenir au moins 6 caractères';
                return;
            }

            try {
                const response = await fetch('/api/company/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        entreprise: entrepriseData,
                        administrateur: adminData
                    })
                });
                const data = await response.json();

                if (response.ok && data.success) {
                    successDiv.classList.remove('d-none');
                    successDiv.innerHTML = '✅ Entreprise créée avec succès ! Vous allez être redirigé vers la page de connexion...';
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    errorDiv.classList.remove('d-none');
                    errorDiv.textContent = data.message || 'Erreur lors de la création';
                }
            } catch (err) {
                errorDiv.classList.remove('d-none');
                errorDiv.textContent = 'Erreur de connexion au serveur. Veuillez réessayer.';
            }
        });

        updateStepUI();
    </script>
</body>
</html>
