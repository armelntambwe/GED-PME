<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GED-PME – Inscription entreprise</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .register-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
            width: 500px;
            max-width: 100%;
            padding: 40px;
        }

        .register-container h1 {
            text-align: center;
            color: #1e293b;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .register-container h1 i {
            color: #667eea;
            margin-right: 10px;
        }

        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #334155;
            font-size: 14px;
        }

        .form-group label i {
            color: #667eea;
            width: 20px;
            margin-right: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        .password-strength {
            margin-top: 8px;
            font-size: 12px;
        }

        .strength-bar {
            height: 4px;
            background: #e2e8f0;
            border-radius: 2px;
            margin-top: 8px;
            width: 100%;
        }

        .strength-bar-fill {
            height: 100%;
            border-radius: 2px;
            width: 0%;
            transition: width 0.3s;
        }

        .strength-text {
            margin-top: 5px;
            font-size: 11px;
            color: #64748b;
        }

        .btn-register {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 10px;
        }

        .btn-register:hover {
            transform: translateY(-2px);
        }

        .login-link {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: #64748b;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
        }

        .success-message {
            background: #d1fae5;
            color: #059669;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <h1><i class="fas fa-building"></i> Créer mon entreprise</h1>
        <div class="subtitle">Inscrivez votre entreprise et gérez vos documents</div>

        <div id="message"></div>

        <form id="registerForm">
            <div class="form-group">
                <label><i class="fas fa-building"></i> Nom de l'entreprise</label>
                <input type="text" id="entrepriseNom" placeholder="Ex: Congo Tech Solutions" required>
            </div>

            <div class="form-group">
                <label><i class="fas fa-user"></i> Nom du responsable</label>
                <input type="text" id="responsableNom" placeholder="Jean Dupont" required>
            </div>

            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email</label>
                <input type="email" id="email" placeholder="contact@entreprise.com" required>
            </div>

            <div class="form-group">
                <label><i class="fas fa-phone"></i> Téléphone</label>
                <input type="tel" id="telephone" placeholder="+243812345678">
            </div>

            <div class="form-group">
                <label><i class="fas fa-lock"></i> Mot de passe</label>
                <input type="password" id="password" placeholder="••••••••" required>
                <div class="password-strength">
                    <div class="strength-bar">
                        <div class="strength-bar-fill" id="strengthBar"></div>
                    </div>
                    <div class="strength-text" id="strengthText"></div>
                </div>
            </div>

            <button type="submit" class="btn-register"><i class="fas fa-check-circle"></i> Créer mon entreprise</button>
        </form>

        <div class="login-link">
            Vous avez déjà un compte ? <a href="/login">Se connecter</a>
        </div>
    </div>

    <script>
        // Indicateur de force du mot de passe
        const passwordInput = document.getElementById('password');
        const strengthBar = document.getElementById('strengthBar');
        const strengthText = document.getElementById('strengthText');

        passwordInput.addEventListener('input', function() {
            const password = this.value;
            let strength = 0;
            let color = '#ef4444';
            let text = 'Très faible';

            if (password.length >= 6) strength++;
            if (password.length >= 10) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;

            if (strength >= 4) {
                color = '#10b981';
                text = 'Fort';
            } else if (strength >= 3) {
                color = '#f59e0b';
                text = 'Moyen';
            } else if (strength >= 2) {
                color = '#f59e0b';
                text = 'Faible';
            } else {
                color = '#ef4444';
                text = 'Très faible';
            }

            strengthBar.style.width = (strength * 20) + '%';
            strengthBar.style.backgroundColor = color;
            strengthText.textContent = text;
            strengthText.style.color = color;
        });

        // Soumission du formulaire
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const data = {
                entreprise_nom: document.getElementById('entrepriseNom').value,
                responsable_nom: document.getElementById('responsableNom').value,
                email: document.getElementById('email').value,
                telephone: document.getElementById('telephone').value,
                password: document.getElementById('password').value
            };

            if (!data.entreprise_nom || !data.responsable_nom || !data.email || !data.password) {
                document.getElementById('message').innerHTML = '<div class="error-message"><i class="fas fa-exclamation-triangle"></i> Tous les champs obligatoires doivent être remplis</div>';
                return;
            }

            try {
                const response = await fetch('/api/register-company', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    document.getElementById('message').innerHTML = '<div class="success-message"><i class="fas fa-check-circle"></i> ' + result.message + '</div>';
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    document.getElementById('message').innerHTML = '<div class="error-message"><i class="fas fa-exclamation-triangle"></i> ' + result.message + '</div>';
                }
            } catch (error) {
                document.getElementById('message').innerHTML = '<div class="error-message"><i class="fas fa-exclamation-triangle"></i> Erreur de connexion au serveur</div>';
            }
        });
    </script>
</body>
</html>
