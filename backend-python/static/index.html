<!DOCTYPE html>
<html>
<head>
    <title>GED-PME Test</title>
</head>
<body>
    <h1>📁 GED-PME - TEST CONNEXION</h1>
    
    <div style="border:2px solid blue; padding:20px; margin:20px">
        <h2>🔐 FORMULAIRE DE CONNEXION</h2>
        Email: <input type="text" id="email" value="admin@test.com"><br>
        Mot de passe: <input type="password" id="password" value="admin123"><br>
        <button onclick="login()" style="background:blue; color:white; padding:10px">SE CONNECTER</button>
        <div id="login-status"></div>
    </div>

    <script>
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            document.getElementById('login-status').innerHTML = 'Connexion en cours...';
            
            try {
                const response = await fetch('http://localhost:5000/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password})
                });
                
                const result = await response.json();
                
                if (result.success) {
                    document.getElementById('login-status').innerHTML = '✅ CONNECTÉ!';
                } else {
                    document.getElementById('login-status').innerHTML = '❌ ' + result.message;
                }
            } catch (error) {
                document.getElementById('login-status').innerHTML = '❌ Erreur: ' + error.message;
            }
        }
    </script>
</body>
</html>
